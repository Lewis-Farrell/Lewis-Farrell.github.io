<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.summary | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/variables.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/layout.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/typography.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/components.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/animations.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/subpage.css' | relative_url }}">
  {% if page.math %}
  <script>
    MathJax = {
      tex: {
        inlineMath: [['$', '$'], ['\\(', '\\)']],
        displayMath: [['$$', '$$'], ['\\[', '\\]']],
        tags: 'ams'
      },
      options: { skipHtmlTags: ['script','noscript','style','textarea','pre'] }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" async></script>
  {% endif %}
</head>
<body{% if page.page_class %} class="page-{{ page.page_class }}"{% endif %}>
  <div class="page-bg-layer" aria-hidden="true"></div>
  <div class="page-frame" aria-hidden="true"></div>
  {% include navbar.html %}
  {% include mobile-menu.html %}

  <main>
    {{ content }}
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
