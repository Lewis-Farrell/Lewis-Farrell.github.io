<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Lewis Farrell</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0B1020">
  <link rel="stylesheet" href="{{ '/assets/css/variables.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/portal.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="portal-body">

  {% include mobile-menu.html %}

  <header class="portal-nav">
    <a href="{{ '/' | relative_url }}" class="portal-brand">Lewis Farrell</a>
    <!-- Mobile-only bio strip (replaces bio panel on small screens) -->
    <div class="portal-nav-bio">
      <div class="nav-bio-avatar">
        <img src="/assets/images/headshot.jpg" alt="Lewis Farrell" onerror="this.style.display='none'">
      </div>
      <div class="nav-bio-identity">
        <span class="nav-bio-name">Lewis Farrell</span>
        <span class="nav-bio-title">Consultant · Intimacy Economist</span>
      </div>
    </div>
    <nav class="portal-nav-links">
      <a href="{{ '/professional' | relative_url }}">Professional</a>
      <a href="{{ '/relationships' | relative_url }}">Relationships</a>
    </nav>
    <button class="portal-toggle" aria-label="Open menu" onclick="openMobileMenu()">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
      </svg>
    </button>
  </header>

  {{ content }}

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  <script src="{{ '/assets/js/portal.js' | relative_url }}"></script>
</body>
</html>
