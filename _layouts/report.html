---
layout: default
---
<article class="report-page">
  <div class="container-reading">
    <header class="page-hero" style="text-align: left; padding-bottom: var(--space-6);">
      <h1>{{ page.title }}</h1>
      {% if page.summary %}<p style="color: var(--text-secondary); font-size: 18px; margin-top: var(--space-4);">{{ page.summary }}</p>{% endif %}
      {% if page.audience %}
      <div class="metadata-row" style="margin-top: var(--space-4);">
        <span>Audience: {{ page.audience }}</span>
      </div>
      {% endif %}
    </header>

    <div class="reading-content">
      {{ content }}
    </div>

    {% if page.file %}
    <div class="cta-section" style="border-top: 1px solid var(--border); margin-top: var(--space-8);">
      <h2>Download Report</h2>
      <p>Get the full report as a PDF.</p>
      <a href="{{ page.file | relative_url }}" class="btn btn-primary btn-lg" download>Download PDF</a>
    </div>
    {% endif %}
  </div>
</article>
