<section class="hero">
  <div class="container">
    <div class="hero-content fade-in">
      {% if include.eyebrow %}<p class="hero-name">{{ include.eyebrow }}</p>{% endif %}
      <h1 class="display-xl hero-headline">{{ include.title }}</h1>
      {% if include.subtitle %}<p class="hero-sub">{{ include.subtitle }}</p>{% endif %}
      {% if include.cta1_label %}
      <div class="hero-buttons">
        <a href="{{ include.cta1_link }}" class="btn btn-primary btn-lg">{{ include.cta1_label }}</a>
        {% if include.cta2_label %}
        <a href="{{ include.cta2_link }}" class="btn btn-secondary btn-lg">{{ include.cta2_label }}</a>
        {% endif %}
      </div>
      {% endif %}
    </div>
  </div>
</section>
